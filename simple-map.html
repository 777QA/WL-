<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山东旅游地图 - 互动版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #228B22;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
        }

        .map-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
            align-items: start;
        }

        .featured-image {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .featured-image img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
        }

        .image-overlay h3 {
            margin-bottom: 0.3rem;
            font-size: 1.4rem;
        }

        .image-overlay p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .spot-list {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .spot-list h4 {
            margin-bottom: 0.8rem;
            color: #333;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #eee;
        }

        .spot-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.6rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 0.4rem;
        }

        .spot-item:hover {
            background: #f8f9fa;
            transform: translateX(4px);
        }

        .spot-item img {
            width: 45px;
            height: 45px;
            border-radius: 6px;
            object-fit: cover;
        }

        .spot-name {
            font-weight: 500;
            color: #333;
        }

        .spot-location {
            font-size: 0.75rem;
            color: #888;
        }

        .map-panel {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .map-header h3 {
            color: #333;
            font-size: 1.2rem;
        }

        .map-legend {
            display: flex;
            gap: 1.2rem;
            font-size: 0.8rem;
            color: #666;
        }

        .legend-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }

        .legend-dot.green { background: #66BB6A; }
        .legend-dot.blue { background: #64B5F6; }

        .map-container {
            display: flex;
            justify-content: center;
            padding: 1rem 0;
        }

        .shandong-map {
            width: 100%;
            max-width: 450px;
            height: auto;
        }

        .map-marker {
            cursor: pointer;
            transition: transform 0.3s;
        }

        .map-marker:hover {
            transform: scale(1.15);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: rgba(0,0,0,0.7);
        }

        .modal-header {
            position: relative;
            height: 200px;
        }

        .modal-header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 0.3rem;
        }

        .modal-location {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .modal-desc {
            color: #555;
            line-height: 1.7;
            margin-bottom: 1.2rem;
        }

        .modal-attractions {
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }

        .modal-attractions h4 {
            margin-bottom: 0.8rem;
            color: #333;
        }

        .attraction-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.6rem;
        }

        .attraction-item {
            text-align: center;
        }

        .attraction-item img {
            width: 100%;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 0.3rem;
        }

        .attraction-item span {
            font-size: 0.75rem;
            color: #666;
        }

        @media (max-width: 800px) {
            .map-wrapper {
                grid-template-columns: 1fr;
            }
            .map-header {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>山东旅游地图</h1>
        <p class="subtitle">点击地图上的城市标记，探索山东美景</p>

        <div class="map-wrapper">
            <div class="left-panel">
                <div class="featured-image">
                    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600" alt="泰山风光">
                    <div class="image-overlay">
                        <h3>泰山</h3>
                        <p>五岳之首 · 世界文化与自然遗产</p>
                    </div>
                </div>
                <div class="spot-list">
                    <h4>热门景点</h4>
                    <div class="spot-item" onclick="showCityModal('jinan')">
                        <img src="https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=80" alt="趵突泉">
                        <div>
                            <div class="spot-name">趵突泉</div>
                            <div class="spot-location">济南</div>
                        </div>
                    </div>
                    <div class="spot-item" onclick="showCityModal('taian')">
                        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=80" alt="泰山">
                        <div>
                            <div class="spot-name">泰山</div>
                            <div class="spot-location">泰安</div>
                        </div>
                    </div>
                    <div class="spot-item" onclick="showCityModal('qingdao')">
                        <img src="https://images.unsplash.com/photo-1523307891476-40c646be55af?w=80" alt="八大关">
                        <div>
                            <div class="spot-name">八大关</div>
                            <div class="spot-location">青岛</div>
                        </div>
                    </div>
                    <div class="spot-item" onclick="showCityModal('qufu')">
                        <img src="https://images.unsplash.com/photo-1513407030348-c983a97b98d8?w=80" alt="孔庙">
                        <div>
                            <div class="spot-name">孔庙</div>
                            <div class="spot-location">曲阜</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="map-panel">
                <div class="map-header">
                    <h3>山东旅游地图</h3>
                    <div class="map-legend">
                        <span><span class="legend-dot green"></span> 自然景观</span>
                        <span><span class="legend-dot blue"></span> 文化古迹</span>
                    </div>
                </div>
                <div class="map-container">
                    <svg viewBox="0 0 500 400" class="shandong-map">
                        <defs>
                            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                                <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
                            </filter>
                        </defs>
                        <path d="M80,350 Q100,320 120,300 L140,280 Q160,260 180,270 L200,260 Q220,250 240,260 L260,280 Q280,300 300,290 L320,280 Q340,270 360,280 L380,300 Q400,320 380,350 L340,370 Q300,380 260,370 L220,360 Q180,355 140,360 L100,365 Q80,360 80,350" fill="#f8f9fa" stroke="#228B22" stroke-width="2" filter="url(#shadow)"/>
                        <g class="map-marker" onclick="showCityModal('jinan')">
                            <circle cx="140" cy="280" r="14" fill="#E8F5E9" stroke="#66BB6A" stroke-width="2"/>
                            <circle cx="140" cy="280" r="7" fill="#66BB6A"/>
                        </g>
                        <text x="140" y="302" text-anchor="middle" font-size="10" fill="#666">济南</text>
                        <g class="map-marker" onclick="showCityModal('taian')">
                            <circle cx="180" cy="260" r="14" fill="#E3F2FD" stroke="#64B5F6" stroke-width="2"/>
                            <circle cx="180" cy="260" r="7" fill="#64B5F6"/>
                        </g>
                        <text x="180" y="282" text-anchor="middle" font-size="10" fill="#666">泰安</text>
                        <g class="map-marker" onclick="showCityModal('qingdao')">
                            <circle cx="280" cy="240" r="14" fill="#E8F5E9" stroke="#66BB6A" stroke-width="2"/>
                            <circle cx="280" cy="240" r="7" fill="#66BB6A"/>
                        </g>
                        <text x="280" y="262" text-anchor="middle" font-size="10" fill="#666">青岛</text>
                        <g class="map-marker" onclick="showCityModal('qufu')">
                            <circle cx="220" cy="300" r="14" fill="#E3F2FD" stroke="#64B5F6" stroke-width="2"/>
                            <circle cx="220" cy="300" r="7" fill="#64B5F6"/>
                        </g>
                        <text x="220" y="322" text-anchor="middle" font-size="10" fill="#666">曲阜</text>
                        <g class="map-marker" onclick="showCityModal('weihai')">
                            <circle cx="340" cy="200" r="14" fill="#E8F5E9" stroke="#66BB6A" stroke-width="2"/>
                            <circle cx="340" cy="200" r="7" fill="#66BB6A"/>
                        </g>
                        <text x="340" y="222" text-anchor="middle" font-size="10" fill="#666">威海</text>
                        <g class="map-marker" onclick="showCityModal('zibo')">
                            <circle cx="160" cy="240" r="14" fill="#E3F2FD" stroke="#64B5F6" stroke-width="2"/>
                            <circle cx="160" cy="240" r="7" fill="#64B5F6"/>
                        </g>
                        <text x="160" y="262" text-anchor="middle" font-size="10" fill="#666">淄博</text>
                        <g class="map-marker" onclick="showCityModal('linyi')">
                            <circle cx="260" cy="330" r="14" fill="#E8F5E9" stroke="#66BB6A" stroke-width="2"/>
                            <circle cx="260" cy="330" r="7" fill="#66BB6A"/>
                        </g>
                        <text x="260" y="352" text-anchor="middle" font-size="10" fill="#666">临沂</text>
                        <g class="map-marker" onclick="showCityModal('weifang')">
                            <circle cx="220" cy="220" r="14" fill="#E3F2FD" stroke="#64B5F6" stroke-width="2"/>
                            <circle cx="220" cy="220" r="7" fill="#64B5F6"/>
                        </g>
                        <text x="220" y="242" text-anchor="middle" font-size="10" fill="#666">潍坊</text>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="city-modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-header">
                <img id="modal-image" src="" alt="城市图片">
            </div>
            <div class="modal-body">
                <h3 class="modal-title" id="modal-title"></h3>
                <p class="modal-location" id="modal-location"></p>
                <p class="modal-desc" id="modal-desc"></p>
                <div class="modal-attractions">
                    <h4>著名景点</h4>
                    <div class="attraction-grid" id="modal-attractions"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cityData = {
            jinan: {
                title: '济南',
                subtitle: '泉城',
                image: 'https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=800',
                desc: '济南，别称泉城，是山东省省会，因市内泉水众多而得名。这里有趵突泉、大明湖、千佛山等著名景点，是一座充满历史文化底蕴的城市。',
                attractions: [
                    { name: '趵突泉', img: 'https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=100' },
                    { name: '大明湖', img: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=100' },
                    { name: '千佛山', img: 'https://images.unsplash.com/photo-1523307891476-40c646be55af?w=100' }
                ]
            },
            taian: {
                title: '泰安',
                subtitle: '五岳之首',
                image: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800',
                desc: '泰安因泰山而得名，是著名的旅游城市。泰山作为五岳之首，是历代帝王封禅之地，也是世界文化与自然双重遗产。',
                attractions: [
                    { name: '泰山', img: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=100' },
                    { name: '岱庙', img: 'https://images.unsplash.com/photo-1513407030348-c983a97b98d8?w=100' },
                    { name: '红门宫', img: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=100' }
                ]
            },
            qingdao: {
                title: '青岛',
                subtitle: '海滨城市',
                image: 'https://images.unsplash.com/photo-1523307891476-40c646be55af?w=800',
                desc: '青岛，一座美丽的海滨城市，以啤酒、海鲜和欧式建筑闻名。八大关景区、栈桥、崂山等景点吸引着无数游客前来观光。',
                attractions: [
                    { name: '八大关', img: 'https://images.unsplash.com/photo-1523307891476-40c646be55af?w=100' },
                    { name: '栈桥', img: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=100' },
                    { name: '崂山', img: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=100' }
                ]
            },
            qufu: {
                title: '曲阜',
                subtitle: '孔子故里',
                image: 'https://images.unsplash.com/photo-1513407030348-c983a97b98d8?w=800',
                desc: '曲阜是孔子的故乡，是儒家文化的发源地。孔庙、孔府、孔林被称为"三孔"，是世界文化遗产，吸引着世界各地的游客。',
                attractions: [
                    { name: '孔庙', img: 'https://images.unsplash.com/photo-1513407030348-c983a97b98d8?w=100' },
                    { name: '孔府', img: 'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=100' },
                    { name: '孔林', img: 'https://images.unsplash.com/photo-1523307891476-40c646be55af?w=100' }
                ]
            },
            weihai: {
                title: '威海',
                subtitle: '海滨花园',
                image: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800',
                desc: '威海，一座美丽的海滨花园城市，拥有绵长的海岸线和清澈的海水。刘公岛、成山头等景点让人流连忘返。',
                attractions: [
                    { name: '刘公岛', img: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=100' },
                    { name: '成山头', img: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=100' },
                    { name: '国际海水浴场', img: 'https://images.unsplash.com/photo-1523307891476-40c646be55af?w=100' }
                ]
            },
            zibo: {
                title: '淄博',
                subtitle: '齐文化之都',
                image: 'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=800',
                desc: '淄博是齐国故都，拥有丰富的历史文化遗产。周村古商城、聊斋城、齐国历史博物馆等景点展现了淄博的独特魅力。',
                attractions: [
                    { name: '周村古商城', img: 'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=100' },
                    { name: '聊斋城', img: 'https://images.unsplash.com/photo-1513407030348-c983a97b98d8?w=100' },
                    { name: '齐山', img: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=100' }
                ]
            },
            linyi: {
                title: '临沂',
                subtitle: '山水绿城',
                image: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800',
                desc: '临沂位于山东省东南部，拥有蒙山、沂水等自然风光，是著名的革命老区，也是书圣王羲之的故乡。',
                attractions: [
                    { name: '蒙山', img: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=100' },
                    { name: '地下大峡谷', img: 'https://images.unsplash.com/photo-1523307891476-40c646be55af?w=100' },
                    { name: '王羲之故居', img: 'https://images.unsplash.com/photo-1513407030348-c983a97b98d8?w=100' }
                ]
            },
            weifang: {
                title: '潍坊',
                subtitle: '风筝之都',
                image: 'https://images.unsplash.com/photo-1513407030348-c983a97b98d8?w=800',
                desc: '潍坊是世界风筝之都，每年举办国际风筝节。杨家埠木版年画、十笏园等文化景点吸引着众多游客。',
                attractions: [
                    { name: '风筝博物馆', img: 'https://images.unsplash.com/photo-1513407030348-c983a97b98d8?w=100' },
                    { name: '杨家埠', img: 'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=100' },
                    { name: '十笏园', img: 'https://images.unsplash.com/photo-1523307891476-40c646be55af?w=100' }
                ]
            }
        };

        function showCityModal(cityId) {
            const city = cityData[cityId];
            if (!city) return;

            document.getElementById('modal-image').src = city.image;
            document.getElementById('modal-title').textContent = `${city.title} · ${city.subtitle}`;
            document.getElementById('modal-location').textContent = '📍 ' + city.title;
            document.getElementById('modal-desc').textContent = city.desc;

            const attractionsHtml = city.attractions.map(att => `
                <div class="attraction-item">
                    <img src="${att.img}" alt="${att.name}">
                    <span>${att.name}</span>
                </div>
            `).join('');
            document.getElementById('modal-attractions').innerHTML = attractionsHtml;

            document.getElementById('city-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('city-modal').classList.remove('active');
            document.body.style.overflow = '';
        }
    </script>
</body>
</html>
